name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: sysmon-macos-universal2
            archive_name: sysmon-macos-universal2.tar.gz
          - os: ubuntu-latest
            artifact_name: sysmon-linux-x86_64
            archive_name: sysmon-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: sysmon-windows-x86_64
            archive_name: sysmon-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --noconfirm sysmon.spec

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive_name }} -C dist sysmon

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\sysmon\* -DestinationPath ${{ matrix.archive_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/sysmon-macos-universal2/*.tar.gz
            artifacts/sysmon-linux-x86_64/*.tar.gz
            artifacts/sysmon-windows-x86_64/*.zip
