name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: sysmon-macos
          - os: ubuntu-latest
            artifact_name: sysmon-linux
          - os: windows-latest
            artifact_name: sysmon-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller

      # ── macOS: .app bundle ──
      - name: Build .app bundle (macOS)
        if: runner.os == 'macOS'
        run: bash scripts/build-app.sh ${GITHUB_REF_NAME#v}

      - name: Package .app (macOS)
        if: runner.os == 'macOS'
        run: tar -czf sysmon-macos.tar.gz -C dist sysmon.app

      # ── Linux: .deb package ──
      - name: Build .deb package (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/build-deb.sh ${GITHUB_REF_NAME#v} amd64

      - name: Rename .deb (Linux)
        if: runner.os == 'Linux'
        run: mv dist/sysmon_*.deb dist/sysmon-linux.deb

      # ── Windows: .exe ──
      - name: Build .exe (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name sysmon.exe --strip --clean --noconfirm run.py

      - name: Package .exe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\sysmon.exe -DestinationPath sysmon-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/sysmon-macos.tar.gz
            dist/sysmon-linux.deb
            dist/sysmon-windows.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/sysmon-macos/sysmon-macos.tar.gz
            artifacts/sysmon-linux/sysmon-linux.deb
            artifacts/sysmon-windows/sysmon-windows.zip
